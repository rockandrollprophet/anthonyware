# VFIO Configuration for GPU Passthrough
# Place these settings in your system configuration

# ============================================
# 1. IOMMU Groups
# ============================================
# Check IOMMU groups with:
# for d in /sys/kernel/iommu_groups/*/devices/*; do n=${d#*/iommu_groups/*}; n=${n%%/*}; printf 'IOMMU Group %s ' "$n"; lspci -nns "${d##*/}"; done

# ============================================
# 2. Kernel Parameters (add to GRUB_CMDLINE_LINUX)
# ============================================
# Intel CPU:
# intel_iommu=on iommu=pt vfio-pci.ids=10de:1b80,10de:10f0

# AMD CPU:
# amd_iommu=on iommu=pt vfio-pci.ids=10de:1b80,10de:10f0

# Replace the IDs with your GPU's vendor:device IDs from lspci -nn

# ============================================
# 3. VFIO Modules (/etc/mkinitcpio.conf)
# ============================================
# MODULES=(vfio_pci vfio vfio_iommu_type1 vfio_virqfd)

# ============================================
# 4. Blacklist GPU Drivers
# ============================================
# Create /etc/modprobe.d/vfio.conf with:
# blacklist nouveau
# blacklist nvidia
# blacklist nvidiafb
# blacklist nvidia_drm
# options vfio-pci ids=10de:1b80,10de:10f0

# ============================================
# 5. Example VM XML Snippet
# ============================================
# <hostdev mode='subsystem' type='pci' managed='yes'>
#   <source>
#     <address domain='0x0000' bus='0x01' slot='0x00' function='0x0'/>
#   </source>
#   <address type='pci' domain='0x0000' bus='0x06' slot='0x00' function='0x0'/>
# </hostdev>

# ============================================
# 6. Verification Commands
# ============================================
# Check VFIO driver binding:
# lspci -nnk -d 10de:1b80

# Check IOMMU enabled:
# dmesg | grep -i iommu

# List VFIO devices:
# ls -la /dev/vfio/
